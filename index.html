  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ream);\n  border-bottom: 1px solid rgba(0,0,0,0.08);\n}\n.nav-logo { font-family: var(--font-display); font-weight: 800; font-size: 18px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dark); text-decoration: none; line-height: 1; }\n.nav-logo span { display: block; font-size: 9px; font-weight: 400; letter-spacing: 0.2em; color: var(--gray); text-transform: uppercase; font-family: var(--font-body); }\n.nav-right { display: flex; align-items: center; gap: 40px; }\n.nav-links { display: flex; gap: 40px; list-style: none; align-items: center; }\n.nav-links a { font-family: var(--font-body); font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dark); text-decoration: none; opacity: 0.7; transition: opacity 0.2s; }\n.nav-links a:hover { opacity: 1; }\n\n/* LANG TOGGLE */\n.lang-toggle {\n  display: flex; align-items: center; gap: 0;\n  border: 1px solid rgba(0,0,0,0.15); border-radius: 40px; overflow: hidden;\n  font-family: var(--font-body); font-size: 11px; font-weight: 700; letter-spacing: 0.1em;\n}\n.lang-btn {\n  padding: 8px 16px; cursor: pointer; border: none; background: transparent;\n  text-transform: uppercase; font-size: 11px; font-weight: 700; letter-spacing: 0.1em;\n  color: var(--gray); transition: all 0.2s; font-family: var(--font-body);\n}\n.lang-btn.active { background: var(--dark); color: var(--cream); }\n\n/* HERO */\n#hero { min-height: 100vh; display: grid; grid-template-rows: 1fr auto; padding: 140px 48px 80px; position: relative; }\n.hero-content { display: grid; grid-template-columns: 1fr 1fr; align-items: end; gap: 40px; }\n.hero-title { font-family: var(--font-display); font-weight: 900; font-size: clamp(72px, 9vw, 148px); line-height: 0.9; text-transform: uppercase; letter-spacing: -0.01em; text-wrap: balance; }\n.hero-title .muted { color: var(--light-gray); }\n.hero-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end; gap: 32px; padding-bottom: 12px; }\n.hero-sub { font-size: 11px; font-weight: 400; letter-spacing: 0.1em; line-height: 1.8; text-transform: uppercase; color: var(--gray); text-align: right; max-width: 220px; }\n.btn-primary { display: inline-block; background: var(--dark); color: var(--cream); font-family: var(--font-body); font-size: 13px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; padding: 18px 36px; border-radius: 40px; transition: background 0.2s, transform 0.2s; cursor: pointer; border: none; }\n.btn-primary:hover { background: var(--accent); transform: scale(1.02); }\n.hero-scroll { display: flex; align-items: center; gap: 16px; padding-top: 60px; }\n.hero-scroll-line { width: 60px; height: 1px; background: var(--dark); opacity: 0.2; }\n.hero-scroll-text { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); }\n\n/* MARQUEE */\n.marquee-wrap { overflow: hidden; border-top: 1px solid rgba(0,0,0,0.1); border-bottom: 1px solid rgba(0,0,0,0.1); padding: 16px 0; background: var(--cream); }\n.marquee-inner { display: flex; gap: 0; white-space: nowrap; animation: marquee 20s linear infinite; }\n.marquee-inner span { font-family: var(--font-display); font-size: 13px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gray); padding: 0 32px; }\n.marquee-inner span.dot { color: var(--accent); padding: 0 8px; }\n@keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }\n\n/* CASES */\n#cases { background: var(--dark2); padding: 120px 48px; }\n.cases-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 64px; }\n.cases-title { font-family: var(--font-display); font-weight: 900; font-size: clamp(52px, 6vw, 96px); text-transform: uppercase; line-height: 0.9; color: var(--cream); }\n.cases-title .muted { color: rgba(242,237,229,0.2); }\n.cases-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }\n.case-card { position: relative; background: #2A2A27; border: 1px solid rgba(255,255,255,0.06); overflow: hidden; cursor: pointer; transition: border-color 0.2s; }\n.case-card:hover { border-color: rgba(255,255,255,0.2); }\n.case-thumb { width: 100%; aspect-ratio: 9/16; background: #222220; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }\n.case-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.85; transition: opacity 0.3s; }\n.case-card:hover .case-thumb img { opacity: 1; }\n.case-play { width: 56px; height: 56px; background: rgba(0,109,143,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; transition: transform 0.2s; }\n.case-card:hover .case-play { transform: scale(1.1); }\n.case-play::after { content: ''; border-left: 20px solid white; border-top: 12px solid transparent; border-bottom: 12px solid transparent; margin-left: 4px; }\n.case-info { padding: 20px 24px; }\n.case-specialty { font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }\n.case-title-text { font-family: var(--font-display); font-size: 20px; font-weight: 700; text-transform: uppercase; color: var(--cream); line-height: 1.2; }\n.case-meta { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 8px; letter-spacing: 0.08em; }\n\n/* INSIGHT */\n#insight { background: var(--dark); color: var(--cream); padding: 120px 48px; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }\n.insight-problems { display: flex; flex-direction: column; gap: 48px; }\n.problem-label { font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }\n.problem-title { font-family: var(--font-display); font-size: 28px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; color: var(--cream); margin-bottom: 8px; }\n.problem-desc { font-size: 14px; line-height: 1.7; color: rgba(242,237,229,0.45); max-width: 300px; }\n.insight-tag { font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 32px; }\n.insight-big { font-family: var(--font-display); font-weight: 800; font-size: clamp(48px, 5vw, 88px); text-transform: uppercase; line-height: 0.95; letter-spacing: -0.01em; color: var(--cream); margin-bottom: 40px; }\n.insight-big .muted { color: rgba(242,237,229,0.25); }\n.insight-desc { font-size: 15px; line-height: 1.8; color: rgba(242,237,229,0.55); max-width: 380px; }\n\n/* SERVICES */\n#services { padding: 120px 48px; background: var(--cream); }\n.section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gray); margin-bottom: 20px; }\n.section-title { font-family: var(--font-display); font-weight: 900; font-size: clamp(52px, 6vw, 100px); text-transform: uppercase; line-height: 0.9; letter-spacing: -0.01em; margin-bottom: 80px; }\n.section-title .muted { color: var(--light-gray); }\n.services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.08); }\n.service-card { background: var(--cream); padding: 60px 48px; display: flex; flex-direction: column; gap: 24px; transition: background 0.3s; }\n.service-card:hover { background: #ECE7DF; }\n.service-num { font-family: var(--font-display); font-size: 72px; font-weight: 900; color: rgba(0,0,0,0.06); line-height: 1; letter-spacing: -0.02em; }\n.service-name { font-family: var(--font-display); font-size: 36px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em; line-height: 1.1; }\n.service-desc { font-size: 14px; line-height: 1.8; color: var(--gray); max-width: 340px; }\n.service-tag { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dark); border-top: 1px solid rgba(0,0,0,0.12); padding-top: 20px; margin-top: auto; }\n.service-features { list-style:none; margin-top:auto; display:flex; flex-direction:column; gap:8px; border-top:1px solid rgba(0,0,0,0.1); padding-top:20px; }\n.service-features li { font-size:12px; color:var(--gray); display:flex; gap:8px; }\n.service-features li span { color:var(--accent); }\n\n/* PROCESS */\n#process { background: var(--dark); padding: 120px 48px; }\n.process-header { margin-bottom: 80px; }\n.process-title { font-family: var(--font-display); font-weight: 900; font-size: clamp(52px, 7vw, 120px); text-transform: uppercase; line-height: 0.9; color: var(--cream); }\n.process-title .muted { color: rgba(242,237,229,0.2); }\n.process-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-top: 1px solid rgba(255,255,255,0.08); }\n.process-item { padding: 56px 0; border-bottom: 1px solid rgba(255,255,255,0.08); display: grid; grid-template-columns: 100px 1fr; gap: 32px; align-items: start; }\n.process-item:nth-child(odd) { padding-right: 64px; border-right: 1px solid rgba(255,255,255,0.08); }\n.process-item:nth-child(even) { padding-left: 64px; }\n.process-step-num { font-family: var(--font-display); font-size: 64px; font-weight: 900; color: rgba(255,255,255,0.08); line-height: 1; }\n.process-step-name { font-family: var(--font-display); font-size: 32px; font-weight: 800; text-transform: uppercase; color: var(--cream); letter-spacing: 0.02em; margin-bottom: 12px; }\n.process-step-desc { font-size: 13px; line-height: 1.8; color: rgba(242,237,229,0.4); max-width: 300px; }\n\n/* PRICING */\n#pricing { padding: 120px 48px; background: var(--cream); }\n.pricing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: rgba(0,0,0,0.08); margin-top: 64px; border: 1px solid rgba(0,0,0,0.08); }\n.pricing-card { background: var(--cream); padding: 56px 48px; }\n.pricing-card.featured { background: var(--dark); color: var(--cream); }\n.pricing-badge { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; background: var(--accent); color: white; padding: 5px 12px; margin-bottom: 32px; }\n.pricing-name { font-family: var(--font-display); font-size: 18px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }\n.pricing-name-featured { color: rgba(242,237,229,0.5); }\n.pricing-price { font-family: var(--font-display); font-size: clamp(48px, 5vw, 80px); font-weight: 900; line-height: 1; letter-spacing: -0.02em; margin-bottom: 8px; }\n.pricing-period { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gray); margin-bottom: 40px; }\n.pricing-card.featured .pricing-period { color: rgba(242,237,229,0.35); }\n.pricing-features { list-style: none; display: flex; flex-direction: column; gap: 14px; margin-bottom: 40px; }\n.pricing-features li { font-size: 14px; line-height: 1.5; display: flex; gap: 12px; align-items: flex-start; }\n.pricing-features li::before { content: '—'; color: var(--accent); flex-shrink: 0; font-weight: 600; }\n.pricing-card.featured .pricing-features li { color: rgba(242,237,229,0.65); }\n.btn-outline { display: inline-block; border: 1px solid rgba(0,0,0,0.2); color: var(--dark); font-family: var(--font-body); font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; padding: 16px 32px; border-radius: 40px; transition: all 0.2s; cursor: pointer; background: transparent; }\n.btn-outline:hover { background: var(--dark); color: var(--cream); border-color: transparent; }\n.btn-primary-inv { display: inline-block; background: var(--cream); color: var(--dark); font-family: var(--font-body); font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; padding: 16px 32px; border-radius: 40px; transition: all 0.2s; cursor: pointer; border: none; }\n.btn-primary-inv:hover { background: var(--accent); color: white; }\n.pricing-note { margin-top: 24px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray); text-align: center; line-height: 2; }\n\n/* FAQ */\n#faq { background: var(--dark2); padding: 120px 48px; }\n.faq-title { font-family: var(--font-display); font-weight: 900; font-size: clamp(36px, 4vw, 64px); text-transform: uppercase; color: rgba(242,237,229,0.2); letter-spacing: 0.04em; margin-bottom: 64px; }\n.faq-list { border-top: 1px solid rgba(255,255,255,0.06); }\n.faq-item { border-bottom: 1px solid rgba(255,255,255,0.06); padding: 40px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; cursor: pointer; }\n.faq-item:hover .faq-q { color: var(--cream); }\n.faq-q { font-family: var(--font-display); font-size: clamp(24px, 3vw, 42px); font-weight: 700; text-transform: uppercase; color: rgba(242,237,229,0.6); line-height: 1.1; transition: color 0.2s; }\n.faq-a { font-size: 13px; line-height: 1.9; color: rgba(242,237,229,0.3); align-self: center; }\n\n/* CONTACT */\n#contact { background: var(--dark); padding: 120px 48px 80px; border-top: 1px solid rgba(255,255,255,0.06); }\n.contact-top { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; margin-bottom: 80px; }\n.contact-heading { font-family: var(--font-display); font-weight: 900; font-size: clamp(52px, 6vw, 100px); text-transform: uppercase; color: var(--cream); line-height: 0.9; }\n.contact-heading .muted { color: rgba(242,237,229,0.2); }\n.contact-info { display: flex; flex-direction: column; justify-content: flex-end; gap: 20px; }\n.contact-line { font-family: var(--font-display); font-size: clamp(20px, 2.5vw, 36px); font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; color: var(--cream); text-decoration: none; transition: color 0.2s; }\n.contact-line:hover { color: var(--accent); }\n.contact-note { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(242,237,229,0.25); }\n.contact-bottom { display: flex зуальный уровень HBO в 45 секунд.<\u002Fdiv>\n      <ul class=\"service-features\">\n        <li><span>—<\u002Fspan> <span data-i18n=\"services.s2f1\">5 сюжетных веток × 4 серии = 20 роликов<\u002Fspan><\u002Fli>\n        <li><span>—<\u002Fspan> <span data-i18n=\"services.s2f2\">Экосистема дистрибуции контента<\u002Fspan><\u002Fli>\n        <li><span>—<\u002Fspan> <span data-i18n=\"services.s2f3\">Конверсия 5–15% в подписку<\u002Fspan><\u002Fli>\n      <\u002Ful>\n      <div class=\"service-tag\" data-i18n=\"services.s2tag\">Аккаунт → медиа-франшиза →<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"process\">\n  <div class=\"process-header\" data-reveal=\"\">\n    <h2 class=\"process-title\">\n      <span data-i18n=\"process.title1\">Как мы<\u002Fspan><br><span class=\"muted\" data-i18n=\"process.title2\">работаем.<\u002Fspan>\n    <\u002Fh2>\n  <\u002Fdiv>\n  <div class=\"process-grid\">\n    <div class=\"process-item\" data-reveal=\"\">\n      <div class=\"process-step-num\">01.<\u002Fdiv>\n      <div>\n        <div class=\"process-step-name\" data-i18n=\"process.s1name\">Подписание<\u002Fdiv>\n        <div class=\"process-step-desc\" data-i18n=\"process.s1desc\">Фиксируем объём, сроки и формат видео. 100% предоплата — работа начинается в день оплаты.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"process-item\" data-reveal=\"\">\n      <div class=\"process-step-num\">02.<\u002Fdiv>\n      <div>\n        <div class=\"process-step-name\" data-i18n=\"process.s2name\">Сценарии<\u002Fdiv>\n        <div class=\"process-step-desc\" data-i18n=\"process.s2desc\">Пишем скрипты, хуки и структуру каждого ролика под задачи вашего бизнеса. Согласуем до производства.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"process-item\" data-reveal=\"\">\n      <div class=\"process-step-num\">03.<\u002Fdiv>\n      <div>\n        <div class=\"process-step-name\" data-i18n=\"process.s3name\">Аватары<\u002Fdiv>\n        <div       el.innerHTML = T[lang][key];\n    }\n  });\n\n  document.querySelectorAll('.lang-btn').forEach(btn => {\n    btn.classList.toggle('active', btn.dataset.lang === lang);\n  });\n}\n\ndocument.querySelectorAll('.lang-btn').forEach(btn => {\n  btn.addEventListener('click', () => applyLang(btn.dataset.lang));\n});\n\napplyLang(currentLang);\n\n// ── VIDEO CARDS ───────────────────────────────────────────────\ndocument.querySelectorAll('.case-card').forEach(card => {\n  card.addEventListener('click', () => {\n    const url = card.dataset.url;\n    if (!url) return;\n    const a = document.createElement('a');\n    a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer';\n    document.body.appendChild(a); a.click(); document.body.removeChild(a);\n  });\n});\n\n// ── SCROLL REVEAL ─────────────────────────────────────────────\nconst observer = new IntersectionObserver(entries => {\n  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });\n}, { threshold: 0.12 });\ndocument.querySelectorAll('[data-reveal]').forEach(el => observer.observe(el));\n// Force-reveal anything already in viewport on load\nsetTimeout(() => {\n  document.querySelectorAll('[data-reveal]:not(.visible)').forEach(el => {\n    const r = el.getBoundingClientRect();\n    if (r.top < window.innerHeight) el.classList.add('visible');\n  });\n}, 100);\n\n// ── TWEAKS ────────────────────────────────────────────────────\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\"accent\":\"#006d8f\",\"bg\":\"#F2EDE5\",\"font\":\"'Anton', sans-serif\"}/*EDITMODE-END*/;\n\nfunction applyTweaks(t) {\n  document.documentElement.style.setProperty('--accent', t.accent);\n  document.documentElement.style.setProperty('--cream', t.bg);\n  document.documentElement.style.setProperty('--font-display', t.font);\n  document.getElementById('tweak-accent').value = t.accent;\n  document.getElementById('tweak-bg').value = t.bg;\n  document.getElementById('tweak-font').value = t.font;\n}\napplyTweaks(TWEAK_DEFAULTS);\n\ndocument.getElementById('tweak-accent').addEventListener('input', e => {\n  document.documentElement.style.setProperty('--accent', e.target.value);\n  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{accent: e.target.value}}, '*');\n});\ndocument.getElementById('tweak-bg').addEventListener('change', e => {\n  document.documentElement.style.setProperty('--cream', e.target.value);\n  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{bg: e.target.value}}, '*');\n});\ndocument.getElementById('tweak-font').addEventListener('change', e => {\n  document.documentElement.style.setProperty('--font-display', e.target.value);\n  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{font: e.target.value}}, '*');\n});\n\nwindow.addEventListener('message', e => {\n  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').style.display = 'block';\n  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';\n});\nwindow.parent.postMessage({type:'__edit_mode_available'}, '*');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
